# PostgreSQL configuration for Rails 8.1
#
# Install PostgreSQL and create database:
#   sudo apt-get install postgresql postgresql-contrib libpq-dev
#   sudo -u postgres createuser -s rails_regimen
#   sudo -u postgres psql -c "ALTER USER rails_regimen PASSWORD 'password';"
#
# Configure database connection using environment variables or defaults below

default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: rails_regimen_master_development
  # Use DATABASE_URL environment variable if set
  # Otherwise, use username/password below
  # username: <%= ENV.fetch("DATABASE_USER") { "rails_regimen" } %>
  # password: <%= ENV.fetch("DATABASE_PASSWORD") { "password" } %>
  # host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: rails_regimen_master_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
