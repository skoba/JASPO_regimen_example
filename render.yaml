databases:
  - name: rails-regimen-db
    plan: free
    databaseName: rails_regimen_master_production
    user: rails_regimen

services:
  - type: web
    name: rails-regimen-master
    runtime: ruby
    plan: free
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rails-regimen-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
